.whats-left  { left: 15px; right: auto; }

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const botao = document.querySelector('.whats-fixo');

const swiper = new Swiper('.swiper', {
    loop: false,
    zoom: { maxRatio: 3 },
    navigation: {
        nextEl: '#next',
        prevEl: '#prev'
    },
    on: {
        init: function () {
            atualizarBotao(this.activeIndex);
        },
        slideChange: function () {
            atualizarBotao(this.activeIndex);
        }
    }
});

function atualizarBotao(index){

    const ocultar = [0,5,7];

    botao.classList.remove('whats-left','whats-right','whats-center');

    if (ocultar.includes(index)) {
        botao.classList.remove('show');
        return;
    }

    if (index === 1 || index === 2){
        botao.classList.add('whats-left');
    } 
    else if (index === 3 || index === 4){
        botao.classList.add('whats-right');
    } 
    else {
        botao.classList.add('whats-center');
    }

    botao.classList.add('show');
}
</script>
