<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z1N Arquitetura</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#111;
  overflow:hidden;
}

/* CONTAINER */
.container{
  display:flex;
  height:100vh;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

/* DESKTOP AJUSTADO */
@media (min-width: 768px){
  .container{
    width:420px;
    margin:auto;
    border-radius:10px;
    overflow:hidden;
  }
}

/* SLIDE */
.slide{
  min-width:100%;
  height:100vh;
  scroll-snap-align:start;
  position:relative;
}

/* IMAGEM */
.slide img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* CTA DISCRETO */
.cta{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

.btn{
  padding:10px 16px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  text-decoration:none;
  border-radius:4px;
  font-size:14px;
}

/* WHATSAPP FIXO */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
  z-index:999;
}
</style>
</head>

<body>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5516991128533" target="_blank">💬</a>

<div class="container">

  <div class="slide">
    <img src="p1.png">
    <div class="cta">
      <a class="btn" href="https://wa.me/5516991128533">Orçamento</a>
    </div>
  </div>

  <div class="slide">
    <img src="p2.png">
    <div class="cta">
      <a class="btn" href="https://wa.me/5516991128533">Contato</a>
    </div>
  </div>

  <div class="slide">
    <img src="p3.png">
    <div class="cta">
      <a class="btn" href="https://wa.me/5516991128533">Falar</a>
    </div>
  </div>

  <div class="slide"><img src="p4.png"></div>
  <div class="slide"><img src="p5.png"></div>
  <div class="slide"><img src="p6.png"></div>
  <div class="slide"><img src="p7.png"></div>

  <div class="slide">
    <img src="p8.png">
    <div class="cta">
      <a class="btn" href="https://wa.me/5516991128533">WhatsApp</a>
    </div>
  </div>

</div>

</body>
</html>
