<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Z1N Arquitetura</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  overflow:hidden;
}

/* CONTAINER */
.container{
  display:flex;
  height:100vh;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

/* DESKTOP (apresentação controlada) */
@media (min-width:768px){
  .container{
    width:420px;
    margin:auto;
  }
}

/* SLIDES */
.slide{
  min-width:100%;
  height:100vh;
  scroll-snap-align:start;
  position:relative;
}

/* IMAGENS */
.slide img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* IDENTIDADE (primeiro slide) */
.identity{
  position:absolute;
  bottom:40px;
  left:30px;
  color:#fff;
}

.identity h1{
  font-size:16px;
  font-weight:500;
  letter-spacing:2px;
}

.identity p{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

/* WHATSAPP (único CTA) */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:20px;
  text-decoration:none;
  z-index:999;
}
</style>
</head>

<body>

<a class="whatsapp" href="https://wa.me/5516991128533" target="_blank">✉</a>

<div class="container">

  <!-- SLIDE 1 (IDENTIDADE) -->
  <div class="slide">
    <img src="p1.png">
    <div class="identity">
      <h1>Z1N ARQUITETURA</h1>
      <p>Ribeirão Preto — SP</p>
      <p>→ deslize</p>
    </div>
  </div>

  <!-- PROJETOS -->
  <div class="slide"><img src="p2.png"></div>
  <div class="slide"><img src="p3.png"></div>
  <div class="slide"><img src="p4.png"></div>
  <div class="slide"><img src="p5.png"></div>
  <div class="slide"><img src="p6.png"></div>
  <div class="slide"><img src="p7.png"></div>
  <div class="slide"><img src="p8.png"></div>

</div>

</body>
</html>
